<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS Pump Curve Tool</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="top-main">
      <h1>RPS Pump Curve Tool</h1>
      <p class="sub">Pick a pump family, enter the Total Dynamic Head, get a customer-ready chart.</p>
    </div>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">Dark mode</button>
  </div>

  <!-- HOME -->
  <div id="home">
    <div class="grid" id="grid"></div>
  </div>

  <!-- TOOL -->
  <div id="tool" class="hidden">
    <button class="back" id="back">&larr; All pumps</button>
    <div class="card">
      <div class="toolhead">
        <h2 id="toolTitle"></h2>
        <span id="pill" class="pill smart">SMART</span>
      </div>
      <div class="controls">
        <div class="fld"><label for="model">Pump model</label><select id="model"></select></div>
        <div class="fld"><label for="tdh">TDH (feet)</label><input id="tdh" type="number" min="0" step="1"></div>
        <button class="btn secondary" id="copyChart" type="button">Copy chart</button>
        <button class="btn" id="dl" type="button">Download chart</button>
      </div>
      <div class="readout" id="readout"></div>
      <div class="canvas-shell"><canvas id="cv" title="Marked pump curve chart"></canvas></div>
      <div class="foot"><span class="size-note" id="sizeNote">Copy or download size will show here.</span></div>
      <p class="hint">Click <b>Copy chart</b>, then paste into Dialpad with Ctrl+V. Download still works if you want a file. Smart models drop a dot on the curve and read the GPM.</p>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
